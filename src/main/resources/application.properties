spring.application.name=AnalyticsCodeCup
server.port=${SERVER_PORT:8084}

# Base de datos Supabase #3 (separada para MS4)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/analytics?prepareThreshold=0}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD_MS4}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=analytics

# HikariCP - pool reducido como MS2
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# Cliente HTTP hacia MS2 (para reconstruir snapshots)
ms2.base-url=${MS2_BASE_URL:http://localhost:8082}
ms2.internal.timeout-seconds=5

# Shared secrets
analytics.webhook.secret=${ANALYTICS_WEBHOOK_SECRET:dev-webhook-secret-change-in-prod}
ms2.internal.secret=${INTERNAL_API_SECRET:dev-internal-secret-change-in-prod}

# CORS
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

springdoc.swagger-ui.path=/swagger-ui/index.html
